<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>🔒安全控制台</title>

<style>

/* 🌐 全局 */
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:system-ui;
background:#050b18;
color:#e5e7eb;
height:100vh;
height:100dvh; /* 修复移动端 */
overflow:hidden;
}

/* 🌌 背景 */
.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, #1d4ed8 0%, transparent 40%),
radial-gradient(circle at 80% 60%, #7c3aed 0%, transparent 40%),
#050b18;
}

/* 🔐 登录层 */
#loginBox{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter: blur(12px);
z-index:10;
padding:16px;
}

/* 登录卡 */
.loginCard{
width:min(340px, 92vw);  /* 📱 自适应 */
padding:22px;

background:rgba(15,23,42,0.75);
backdrop-filter: blur(20px);

border:1px solid rgba(255,255,255,0.1);
border-radius:14px;
box-shadow:0 20px 80px rgba(0,0,0,0.6);
}

/* 标题 */
h3{
margin:0 0 10px 0;
color:#7dd3fc;
text-align:center;
letter-spacing:1px;
font-size:18px;
}

/* 输入 */
input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
background:#0f172a;
color:white;
outline:none;
font-size:14px;
}

/* 按钮 */
button{
width:100%;
padding:10px;
margin-top:12px;

border:none;
border-radius:10px;

background:linear-gradient(90deg,#38bdf8,#6366f1);
font-weight:bold;
cursor:pointer;

font-size:14px;
}

button:active{
transform:scale(0.98);
}

/* 🛰 主体 */
#app{
display:none;
height:100vh;
height:100dvh;
}

/* 布局 */
.container{
display:flex;
height:100%;
}

/* 左侧 */
.panel{
width:280px;
padding:16px;

background:rgba(15,23,42,0.8);
backdrop-filter: blur(18px);

border-right:1px solid rgba(255,255,255,0.06);
}

/* 右侧 */
.main{
flex:1;
padding:16px;
overflow:auto;
}

/* 标题 */
.title{
font-size:14px;
opacity:0.8;
margin-bottom:12px;
}

/* 日志 */
.item{
padding:12px;
margin-bottom:10px;

border-radius:12px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.05);

transition:0.2s;
}

.item:hover{
transform:translateX(3px);
background:rgba(255,255,255,0.06);
}

/* 风险 */
.low{ border-left:3px solid #22c55e; }
.mid{ border-left:3px solid #f59e0b; }
.high{ border-left:3px solid #ef4444; }

.meta{
font-size:12px;
opacity:0.7;
margin-top:4px;
}

/* 📱 手机适配 */
@media (max-width: 768px){

.container{
flex-direction:column;
}

/* 左侧变顶部 */
.panel{
width:100%;
border-right:none;
border-bottom:1px solid rgba(255,255,255,0.06);
}

/* 日志更紧凑 */
.item{
padding:10px;
font-size:13px;
}

}

/* 📱 小屏优化 */
@media (max-width: 480px){

.loginCard{
padding:18px;
border-radius:12px;
}

h3{
font-size:16px;
}

.item{
font-size:12px;
}

}

</style>

</head>

<body>

<div class="bg"></div>

<!-- 🔐 登录 -->
<div id="loginBox">
<div class="loginCard">
<h3>🛡 管理员登录</h3>

<input id="pwd" type="password" placeholder="请输入管理员密码"/>
<button onclick="login()">进入控制台</button>

<p style="text-align:center;font-size:12px;color:#94a3b8;margin-top:10px;">
仅授权人员可访问
</p>

</div>
</div>

<!-- 🛰 控制台 -->
<div id="app">
<div class="container">

<div class="panel">
<h3 style="color:#7dd3fc;">🚨 控制面板</h3>

<input id="ip" placeholder="IP 地址"/>
<input id="reason" placeholder="封禁原因"/>

<button onclick="blockIP()">加入黑名单</button>

<button onclick="loadLogs()" style="background:#0ea5e9;">
刷新日志
</button>

</div>

<div class="main">

<div class="title">📊 实时访问日志</div>

<div id="logs">加载中...</div>

</div>

</div>
</div>

<script>

const ADMIN_PASSWORD = "Abc?123789";

/* 🔐 登录 */
function login(){
const v = document.getElementById("pwd").value;

if(v === ADMIN_PASSWORD){
document.getElementById("loginBox").style.display = "none";
document.getElementById("app").style.display = "block";
loadLogs();
}else{
alert("访问被拒绝");
}
}

/* 📊 logs */
async function loadLogs(){

try{

const res = await fetch("/api/logs");
const data = await res.json();

document.getElementById("logs").innerHTML =
(data || []).map(d => `
<div class="item ${d.risk}">
<div>🌐 IP：${d.ip}</div>
<div class="meta">📍 ${d.country} / ${d.city}</div>
</div>
`).join("");

}catch(e){
document.getElementById("logs").innerHTML =
"<div style='color:red'>加载失败</div>";
}

}

/* 🚫 黑名单 */
async function blockIP(){

const ip = document.getElementById("ip").value.trim();
const reason = document.getElementById("reason").value.trim();

if(!ip) return alert("请输入IP地址");

await fetch("/api/blacklist",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ ip, reason })
});

loadLogs();
}

</script>

</body>
</html>
