<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>安全控制台</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#050b18;
color:#e5e7eb;
overflow:hidden;
}

/* 🌌 背景 */
.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, #1d4ed8 0%, transparent 40%),
radial-gradient(circle at 80% 60%, #7c3aed 0%, transparent 40%),
#050b18;
}

/* 🔐 登录层 */
#loginBox{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter: blur(12px);
z-index:10;
}

/* 登录卡 */
.loginCard{
width:340px;
padding:26px;
background:rgba(15,23,42,0.75);
backdrop-filter: blur(20px);
border:1px solid rgba(255,255,255,0.1);
border-radius:14px;
box-shadow:0 20px 80px rgba(0,0,0,0.6);
}

h3{
margin:0 0 10px 0;
color:#7dd3fc;
text-align:center;
letter-spacing:1px;
}

/* 输入 */
input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
background:#0f172a;
color:white;
outline:none;
}

/* 按钮 */
button{
width:100%;
padding:10px;
margin-top:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#38bdf8,#6366f1);
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 10px 30px rgba(56,189,248,0.25);
}

/* 🛰 主体 */
#app{
display:none;
height:100vh;
}

/* 左侧 */
.panel{
width:280px;
padding:16px;
background:rgba(15,23,42,0.8);
backdrop-filter: blur(18px);
border-right:1px solid rgba(255,255,255,0.06);
}

/* 布局 */
.container{
display:flex;
height:100vh;
}

/* 主内容 */
.main{
flex:1;
padding:16px;
overflow:auto;
}

/* 标题 */
.title{
font-size:14px;
opacity:0.8;
margin-bottom:12px;
}

/* 日志卡片 */
.item{
padding:12px;
margin-bottom:10px;
border-radius:12px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.05);
transition:0.2s;
}

.item:hover{
background:rgba(255,255,255,0.06);
transform:translateX(3px);
}

/* 风险 */
.low{ border-left:3px solid #22c55e; }
.mid{ border-left:3px solid #f59e0b; }
.high{ border-left:3px solid #ef4444; }

.meta{
font-size:12px;
opacity:0.7;
margin-top:4px;
}

</style>

</head>

<body>

<div class="bg"></div>

<!-- 🔐 登录 -->
<div id="loginBox">
<div class="loginCard">
<h3>🛡 管理员登录</h3>

<input id="pwd" type="password" placeholder="请输入管理员密码"/>
<button onclick="login()">进入控制台</button>

<p style="text-align:center;font-size:12px;color:#94a3b8;margin-top:10px;">
仅授权人员可访问
</p>

</div>
</div>

<!-- 🛰 控制台 -->
<div id="app">
<div class="container">

<!-- 左侧 -->
<div class="panel">

<h3 style="color:#7dd3fc;margin-bottom:10px;">🚨 控制面板</h3>

<input id="ip" placeholder="IP 地址"/>
<input id="reason" placeholder="封禁原因"/>

<button onclick="blockIP()">加入黑名单</button>

<button onclick="loadLogs()" style="margin-top:10px;background:#0ea5e9;">
刷新访问日志
</button>

</div>

<!-- 右侧 -->
<div class="main">

<div class="title">📊 实时访问日志</div>

<div id="logs">加载中...</div>

</div>

</div>
</div>

<script>

const ADMIN_PASSWORD = "Abc?123789";

/* 🔐 登录 */
function login(){
const v = document.getElementById("pwd").value;

if(v === ADMIN_PASSWORD){
document.getElementById("loginBox").style.display = "none";
document.getElementById("app").style.display = "block";
loadLogs();
}else{
alert("访问被拒绝");
}
}

/* 📊 日志 */
async function loadLogs(){

try{

const res = await fetch("/api/logs");
const data = await res.json();

if(!data || data.length === 0){
document.getElementById("logs").innerHTML =
"<div style='opacity:0.6'>暂无数据</div>";
return;
}

document.getElementById("logs").innerHTML =
data.map(d => `
<div class="item ${d.risk}">
<div>🌐 IP：${d.ip}</div>
<div class="meta">📍 ${d.country} / ${d.city}</div>
</div>
`).join("");

}catch(e){
document.getElementById("logs").innerHTML =
"<div style='color:red'>加载失败</div>";
}

}

/* 🚫 黑名单 */
async function blockIP(){

const ip = document.getElementById("ip").value.trim();
const reason = document.getElementById("reason").value.trim();

if(!ip) return alert("请输入IP地址");

await fetch("/api/blacklist",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ ip, reason })
});

alert("已加入黑名单");

loadLogs();
}

</script>

</body>
</html>
