<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CYBER COMMAND CENTER</title>

<script src="https://unpkg.com/three"></script>
<script src="https://unpkg.com/globe.gl"></script>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:monospace;
color:#00ffcc;
}

#globe{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
}

.hud{
position:absolute;
top:0;
left:0;
width:360px;
height:100vh;
background:rgba(0,0,0,0.65);
padding:16px;
border-right:1px solid #00ffcc33;
overflow:auto;
}

.title{
font-size:18px;
margin-bottom:10px;
}

.log{
font-size:11px;
margin:6px 0;
opacity:0.85;
}

.stat{
margin:10px 0;
color:#00ffcc;
}

.alert{
color:#ff3b3b;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0.2}
}

</style>

</head>

<body>

<div id="globe"></div>

<div class="hud">

<div class="title">🛰 CYBER COMMAND CENTER</div>

<div id="stats" class="stat">INIT...</div>

<div id="logs"></div>

</div>

<script>

const globe = Globe()
(document.getElementById('globe'))

.globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')

.bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')

.backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')

.pointOfView({ lat: 20, lng: 0, altitude: 2.5 });

let points = [];

function updateGlobe(){

globe
.pointsData(points)
.pointLat(d => d.lat)
.pointLng(d => d.lng)
.pointColor(d => {

if(d.count > 5) return "#ff3b3b";
if(d.count > 2) return "#ffaa00";
return "#00ffcc";

})
.pointAltitude(0.02)
.pointRadius(0.3);

}

async function fetchData(){

const res = await fetch("/api/stream");
const reader = res.body.getReader();
const decoder = new TextDecoder();

let buffer = "";

while(true){

const {value, done} = await reader.read();
if(done) break;

buffer += decoder.decode(value);

const parts = buffer.split("\n\n");

buffer = parts.pop();

for(const p of parts){

if(p.includes("data:")){

const json = p.replace("data:","").trim();

const d = JSON.parse(json);

// 合并点数据
let found = points.find(x => x.lat === d.lat && x.lng === d.lon);

if(found){
found.count++;
}else{
points.push({
lat: d.lat,
lng: d.lon,
count: 1
});
}

updateGlobe();

// HUD日志
const log =
document.createElement("div");

log.className="log";

log.innerText =
`${d.ip} | ${d.country} | ${d.city}`;

document.getElementById("logs").prepend(log);

// stats
document.getElementById("stats").innerHTML =
`ACTIVE POINTS: ${points.length}`;

}

}

}

}

fetchData();

</script>

</body>
</html>
