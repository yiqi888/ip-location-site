<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>IP 查询地图版</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body {
margin: 0;
font-family: system-ui;
background: #0f172a;
color: white;
display: flex;
height: 100vh;
}

/* 左侧信息面板 */
.panel {
width: 360px;
padding: 20px;
background: rgba(255,255,255,0.06);
backdrop-filter: blur(14px);
border-right: 1px solid rgba(255,255,255,0.1);
}

.title {
font-size: 18px;
margin-bottom: 12px;
}

.item {
margin: 10px 0;
font-size: 14px;
}

.label { opacity: 0.6; }
.value { color: #38bdf8; }

/* 地图 */
#map {
flex: 1;
}

.button {
margin-top: 12px;
width: 100%;
padding: 10px;
border: none;
border-radius: 10px;
background: #38bdf8;
color: black;
font-weight: bold;
cursor: pointer;
}

.button:hover {
background: #0ea5e9;
}

</style>

</head>

<body>

<div class="panel">
<div class="title">🌍 IP + 地图定位</div>

<div id="info">加载中...</div>

<button class="button" onclick="load()">刷新</button>
</div>

<div id="map"></div>

<script>

let map;
let marker;

function initMap(lat, lon) {

// 初始化地图
map = L.map('map').setView([lat, lon], 10);

// 地图层
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '© OpenStreetMap'
}).addTo(map);

// 标记
marker = L.marker([lat, lon]).addTo(map);

marker.bindPopup("📍 你的 IP 位置").openPopup();

}

async function load() {

const res = await fetch("/api/ip");
const d = await res.json();

/* UI */
document.getElementById("info").innerHTML = `
<div class="item"><span class="label">IP：</span><span class="value">${d.ip}</span></div>
<div class="item"><span class="label">国家：</span><span class="value">${d.country}</span></div>
<div class="item"><span class="label">城市：</span><span class="value">${d.city}</span></div>
<div class="item"><span class="label">地区：</span><span class="value">${d.region}</span></div>
<div class="item"><span class="label">时区：</span><span class="value">${d.timezone}</span></div>
<div class="item"><span class="label">组织：</span><span class="value">${d.org}</span></div>
`;

/* 地图初始化 */
if (!map) {
initMap(d.lat, d.lon);
} else {
map.setView([d.lat, d.lon], 10);
marker.setLatLng([d.lat, d.lon]);
marker.setPopupContent(`📍 ${d.city}, ${d.country}`);
}

}

load();

</script>

</body>
</html>
