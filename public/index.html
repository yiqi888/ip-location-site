<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GLOBAL IP MONITOR</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
background:black;
color:#00ff9f;
font-family:monospace;
overflow:hidden;
}

#map{
height:100vh;
filter:contrast(1.2) brightness(0.8);
}

.hud{
position:absolute;
top:0;
left:0;
width:400px;
height:100vh;
background:rgba(0,0,0,0.7);
padding:20px;
overflow:auto;
border-right:1px solid #00ff9f33;
}

.log{
font-size:12px;
margin:5px 0;
opacity:0.9;
}

.title{
color:#00ff9f;
font-size:18px;
margin-bottom:10px;
}

.scanline{
position:fixed;
width:100%;
height:2px;
background:#00ff9f;
opacity:0.1;
animation:scan 4s linear infinite;
}

@keyframes scan{
0%{top:0}
100%{top:100%}
}

</style>

</head>

<body>

<div class="scanline"></div>

<div class="hud">

<div class="title">🛰 GLOBAL ACCESS MONITOR</div>

<div id="count">ONLINE: 0</div>

<div id="log"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([20,0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:''
}).addTo(map);

let count = 0;

function addPulse(lat, lon){

const circle = L.circle([lat,lon],{
radius:50000,
color:"#00ff9f",
fillOpacity:0.3
}).addTo(map);

setTimeout(()=>map.removeLayer(circle),3000);

}

const evt = new EventSource("/api/stream");

evt.onmessage = (e)=>{

const d = JSON.parse(e.data);

count++;
document.getElementById("count").innerText =
"ONLINE: " + count;

const log =
`[${d.time}] ${d.ip} | ${d.country} | ${d.city}`;

const div = document.createElement("div");
div.className="log";
div.innerText=log;

document.getElementById("log").prepend(div);

if(d.lat && d.lon){
addPulse(d.lat, d.lon);
}

};

</script>

</body>
</html>
