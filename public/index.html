<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>IP 定位查询</title>

<style>

body{
margin:0;
font-family:-apple-system;

background:
linear-gradient(
135deg,
#0f172a,
#111827
);

color:white;

display:flex;

height:100vh;

align-items:center;

justify-content:center;

}

.card{

width:500px;

padding:40px;

border-radius:20px;

background:
rgba(255,255,255,.06);

backdrop-filter:blur(20px);

}

h1{
margin-top:0;
}

.item{
margin:14px 0;
font-size:18px;
}

.value{
color:#60a5fa;
}

</style>

</head>

<body>

<div class="card">

<h1>🌍 IP 定位显示</h1>

<div id="loading">
读取中…
</div>

<div id="info"></div>

</div>

<script>

async function load(){

const r=
await fetch("/api/ip");

const d=
await r.json();

document
.getElementById(
"loading"
).style.display=
"none";

document
.getElementById(
"info"
).innerHTML=`

<div class=item>
IP：
<span class=value>${d.ip}</span>
</div>

<div class=item>
国家：
<span class=value>${d.country}</span>
</div>

<div class=item>
城市：
<span class=value>${d.city}</span>
</div>

<div class=item>
地区：
<span class=value>${d.region}</span>
</div>

<div class=item>
时区：
<span class=value>${d.timezone}</span>
</div>

<div class=item>
ISP：
<span class=value>${d.asn}</span>
</div>

`;

}

load();

</script>

</body>
</html>
