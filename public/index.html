<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>">
<title>IP Intelligence</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

/* 🌐 全局适配 */
*{
box-sizing:border-box;
}

body {
margin: 0;
height: 100vh;
height: 100dvh; /* ✅ 修复手机浏览器地址栏问题 */
overflow: hidden;
font-family: system-ui;
}

/* 🌙 地图 */
#map {
position: absolute;
inset: 0;
filter: brightness(0.75) contrast(1.2) saturate(1.3);
}

/* 🧊 卡片（核心响应式优化） */
.card {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);

width: min(420px, 92vw);   /* ✅ 自动适配手机 */
max-height: 85vh;
overflow-y: auto;

background: rgba(0,0,0,0.55);
backdrop-filter: blur(18px);

border: 1px solid rgba(255,255,255,0.12);
border-radius: 16px;

padding: 16px;
color: white;
box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* 标题 */
.title {
font-size: clamp(14px, 4vw, 18px); /* ✅ 自适应字体 */
margin-bottom: 14px;
color: #7dd3fc;
text-align: center;
}

/* 行布局 */
.row {
margin: 8px 0;
font-size: clamp(12px, 3.5vw, 14px);
display: flex;
justify-content: space-between;
gap: 10px;
flex-wrap: wrap;
}

/* 风险颜色 */
.low { color: #22c55e; }
.medium { color: #f59e0b; }
.high { color: #ef4444; }

/* 按钮（手机优化） */
button {
width: 100%;
margin-top: 10px;
padding: 10px;

border: none;
border-radius: 10px;

background: #38bdf8;
font-weight: bold;
cursor: pointer;

font-size: 14px;
}

button:active {
transform: scale(0.98);
}

button:hover { background: #0ea5e9; }

/* 🇨🇳 旗帜 */
.flag {
font-size: 18px;
margin-right: 6px;
}

/* 📱 小屏优化 */
@media (max-width: 480px){

.card{
padding: 14px;
border-radius: 12px;
}

.row{
flex-direction: column;
align-items: flex-start;
gap: 4px;
}

}

</style>

</head>

<body>

<div id="map"></div>

<div class="card">
<div class="title">🌍 IP Intelligence / IP 信息分析</div>

<div id="info">Loading...</div>

<button onclick="load()">Refresh / 刷新</button>

<button onclick="load(); setTimeout(()=>window.location.href='/admin.html',300)">
Log in / 登录
</button>

</div>

<script>

let map = null;
let marker = null;

/* 🌍 国家旗帜 */
function getFlag(c){
const f = {
US:"🇺🇸", CN:"🇨🇳", RU:"🇷🇺",
JP:"🇯🇵", DE:"🇩🇪", GB:"🇬🇧",
FR:"🇫🇷"
};
return f[c] || "🌐";
}

/* 🧠 风险 */
function normalizeRisk(r){
return (r || "low").toLowerCase();
}

/* 🗺 地图 */
function initMap(lat, lon){

lat = lat || 20;
lon = lon || 0;

map = L.map('map', {
zoomControl: true
}).setView([lat, lon], 2);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
{ attribution: '© OpenStreetMap' }
).addTo(map);

marker = L.marker([lat, lon]).addTo(map);
marker.bindPopup("📍 IP Location / 位置").openPopup();
}

/* 📡 load */
async function load(){

try{

const res = await fetch("/api/ip");
const d = await res.json();

const risk = normalizeRisk(d.risk);

document.getElementById("info").innerHTML = `
<div class="row"><span>🌐 IP</span><span>${d.ip || "-"}</span></div>
<div class="row"><span>🏳️ 国家</span><span>${getFlag(d.country)} ${d.country || "-"}</span></div>
<div class="row"><span>🏙 城市</span><span>${d.city || "-"}</span></div>
<div class="row"><span>📍 地区</span><span>${d.region || "-"}</span></div>
<div class="row"><span>🏢 运营商</span><span>${d.org || "-"}</span></div>
<div class="row"><span>🧠 风险</span><span class="${risk}">${risk.toUpperCase()}</span></div>
`;

const lat = d.lat || 20;
const lon = d.lon || 0;

if(!map){
initMap(lat, lon);
}else{
map.setView([lat, lon], 5);
marker.setLatLng([lat, lon]);
marker.setPopupContent(`${d.city || ""}, ${d.country || ""}`);
}

}catch(e){
document.getElementById("info").innerHTML =
"<div style='color:red'>API ERROR</div>";
console.error(e);
}

}

load();

</script>

</body>
</html>
