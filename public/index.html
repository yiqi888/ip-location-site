<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>IP Intelligence V3.1</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body {
margin: 0;
height: 100vh;
overflow: hidden;
font-family: system-ui;
}

/* 🌙 全屏夜光地图 */
#map {
position: absolute;
top: 0;
left: 0;
right: 0;
bottom: 0;
filter: brightness(0.75) contrast(1.2) saturate(1.3);
}

/* 🎯 中央信息卡 */
.card {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
width: 420px;

background: rgba(0,0,0,0.55);
backdrop-filter: blur(18px);

border: 1px solid rgba(255,255,255,0.12);
border-radius: 16px;

padding: 20px;
color: white;
box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.title {
font-size: 18px;
margin-bottom: 14px;
color: #7dd3fc;
text-align: center;
}

.row {
margin: 10px 0;
font-size: 14px;
display: flex;
justify-content: space-between;
}

.label {
opacity: 0.6;
}

/* 🎨 风险颜色 */
.low { color: #22c55e; }
.medium { color: #f59e0b; }
.high { color: #ef4444; }

/* 按钮 */
button {
width: 100%;
margin-top: 12px;
padding: 10px;
border: none;
border-radius: 10px;
background: #38bdf8;
font-weight: bold;
cursor: pointer;
}

button:hover {
background: #0ea5e9;
}

/* 🌍 旗帜 */
.flag {
font-size: 20px;
margin-right: 6px;
}

.center {
text-align: center;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="card">

<div class="title">🌍 IP Intelligence / IP 信息分析</div>

<div id="info" class="center">Loading...</div>

<button onclick="load()">Refresh / 刷新</button>

</div>

<script>

let map;
let marker;

/* 🧭 国家旗帜 */
function getFlag(c) {
const f = {
US:"🇺🇸", CN:"🇨🇳", RU:"🇷🇺",
JP:"🇯🇵", DE:"🇩🇪", GB:"🇬🇧",
FR:"🇫🇷"
};
return f[c] || "🌐";
}

/* 🧠 风险翻译 */
function riskText(r) {
if (r === "high") return { zh:"高风险", en:"HIGH" };
if (r === "medium") return { zh:"中风险", en:"MEDIUM" };
return { zh:"安全", en:"LOW" };
}

/* 🌙 地图初始化 */
function initMap(lat, lon) {

map = L.map('map').setView([lat, lon], 9);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
{ attribution: '© OpenStreetMap' }
).addTo(map);

marker = L.marker([lat, lon]).addTo(map);
marker.bindPopup("📍 IP Location / 位置").openPopup();
}

/* 📡 加载数据 */
async function load() {

const res = await fetch("/api/ip");
const d = await res.json();

const risk = riskText(d.risk);

/* UI */
document.getElementById("info").innerHTML = `

<div class="row">
<span>🌐 IP</span>
<span>${d.ip}</span>
</div>

<div class="row">
<span>🏳️ Country / 国家</span>
<span>${getFlag(d.country)} ${d.country}</span>
</div>

<div class="row">
<span>🏙 City / 城市</span>
<span>${d.city}</span>
</div>

<div class="row">
<span>📍 Region / 地区</span>
<span>${d.region}</span>
</div>

<div class="row">
<span>🏢 Org / 运营商</span>
<span>${d.org}</span>
</div>

<div class="row">
<span>🧠 Risk / 风险</span>
<span class="${d.risk}">
${risk.en} / ${risk.zh}
</span>
</div>

`;

/* 地图 */
if (!map) {
initMap(d.lat, d.lon);
} else {
map.setView([d.lat, d.lon], 9);
marker.setLatLng([d.lat, d.lon]);
marker.setPopupContent(`${d.city}, ${d.country}`);
}

}

load();

</script>

</body>
</html>
