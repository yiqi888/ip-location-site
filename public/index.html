<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GLOBAL CYBER MONITOR V5</title>

<script src="https://unpkg.com/three@0.155.0/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl"></script>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:monospace;
color:#00ffcc;
}

#globe{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
}

.hud{
position:absolute;
top:0;
left:0;
width:380px;
height:100vh;
background:rgba(0,0,0,0.7);
padding:14px;
overflow:auto;
border-right:1px solid #00ffcc33;
}

.title{
font-size:16px;
margin-bottom:10px;
}

.log{
font-size:11px;
margin:5px 0;
opacity:0.85;
}

.stat{
margin:10px 0;
}

.glow{
color:#00ffcc;
text-shadow:0 0 8px #00ffcc;
}

</style>

</head>

<body>

<div id="globe"></div>

<div class="hud">

<div class="title glow">🛰 GLOBAL CYBER MONITOR V5</div>

<div id="stats" class="stat">INIT...</div>

<div id="logs"></div>

</div>

<script>

const globe = Globe()
(document.getElementById('globe'))

.globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
.bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
.backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
.pointOfView({ lat: 20, lng: 0, altitude: 2.5 });

let points = [];
let seen = new Map();

// 🌍 更新地球点
function render(){

globe
.pointsData(points)
.pointLat(d => d.lat)
.pointLng(d => d.lon)
.pointColor(d => {

if(d.count > 5) return "#ff3b3b";
if(d.count > 2) return "#ffaa00";
return "#00ffcc";

})
.pointRadius(d => 0.3 + d.count * 0.05)
.pointAltitude(0.02);

}

// 🧠 合并点（避免爆炸）
function addPoint(d){

const key = d.country + d.city;

if(seen.has(key)){
seen.get(key).count++;
}else{
seen.set(key,{
lat:d.lat,
lon:d.lon,
country:d.country,
city:d.city,
ip:d.ip,
count:1
});
}

points = Array.from(seen.values());

render();
}

// 🧾 HUD日志
function addLog(d){

const el = document.createElement("div");
el.className="log";
el.innerText = `${d.ip} | ${d.country} | ${d.city}`;

document.getElementById("logs").prepend(el);

// 限制
if(document.getElementById("logs").children.length > 60){
document.getElementById("logs").lastChild.remove();
}

}

// 📡 轮询系统（核心）
async function poll(){

try{

const res = await fetch("/api/ip");
const d = await res.json();

if(d.lat && d.lon){
addPoint(d);
}

addLog(d);

document.getElementById("stats").innerHTML =
`POINTS: ${points.length} | TIME: ${new Date().toLocaleTimeString()}`;

}catch(e){
console.log("poll error",e);
}

}

// 🚀 启动
setInterval(poll, 2000);
poll();

</script>

</body>
</html>
