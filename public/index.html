<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CYBER COMMAND CENTER</title>

<!-- ✅ 正确 CDN（稳定版） -->
<script src="https://unpkg.com/three@0.155.0/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl"></script>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:monospace;
color:#00ffcc;
}

#globe{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
}

.hud{
position:absolute;
top:0;
left:0;
width:360px;
height:100vh;
background:rgba(0,0,0,0.65);
padding:16px;
border-right:1px solid #00ffcc33;
overflow:auto;
}

.title{
font-size:18px;
margin-bottom:10px;
}

.log{
font-size:11px;
margin:6px 0;
opacity:0.85;
}

.stat{
margin:10px 0;
color:#00ffcc;
}

</style>

</head>

<body>

<div id="globe"></div>

<div class="hud">

<div class="title">🛰 CYBER COMMAND CENTER</div>

<div id="stats" class="stat">INIT...</div>

<div id="logs"></div>

</div>

<script>

let points = [];
let globe;

// ✅ 初始化 globe（防崩）
function initGlobe(){

globe = Globe()
(document.getElementById('globe'))

.globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
.bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
.backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')

.pointOfView({ lat: 20, lng: 0, altitude: 2.5 });

render();
}

// ✅ 渲染优化（避免每次全重建）
function render(){

globe.pointsData(points)
.pointLat(d => d.lat)
.pointLng(d => d.lng)
.pointColor(d => {

if(d.count > 5) return "#ff3b3b";
if(d.count > 2) return "#ffaa00";
return "#00ffcc";

})
.pointAltitude(0.02)
.pointRadius(0.3);

}

// ✅ 合并点数据（优化 O(n²)）
function addPoint(d){

const key = `${d.lat}_${d.lon}`;

let found = points.find(x => x.key === key);

if(found){
found.count++;
}else{
points.push({
key,
lat: d.lat,
lon: d.lon,
count: 1
});
}

render();
}

function addLog(d){

const log = document.createElement("div");

log.className="log";

log.innerText =
`${d.ip} | ${d.country} | ${d.city}`;

document.getElementById("logs").prepend(log);

// 限制日志数量（性能优化）
if(document.getElementById("logs").children.length > 50){
document.getElementById("logs").lastChild.remove();
}

document.getElementById("stats").innerHTML =
`ACTIVE POINTS: ${points.length}`;
}

// ✅ SSE + fallback
async function start(){

try{

const res = await fetch("/api/stream");

if(!res.body) throw new Error("No stream");

const reader = res.body.getReader();
const decoder = new TextDecoder();

let buffer = "";

while(true){

const {value, done} = await reader.read();
if(done) break;

buffer += decoder.decode(value);

const parts = buffer.split("\n\n");

buffer = parts.pop();

for(const p of parts){

if(p.includes("data:")){

const json = p.replace("data:","").trim();

const d = JSON.parse(json);

if(d.lat && d.lon){

addPoint({
lat: d.lat,
lon: d.lon
});

}

addLog(d);

}

}

}

}catch(e){

// ❗ fallback（GitHub Pages可用）
console.warn("SSE failed, fallback mode");

// mock数据
setInterval(()=>{

const d = {
ip: "demo.ip",
country: "US",
city: "Portland",
lat: 45.52 + Math.random(),
lon: -122.68 + Math.random()
};

addPoint(d);
addLog(d);

}, 2000);

}

}

initGlobe();
start();

</script>

</body>
</html>
