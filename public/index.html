<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>IP 查询工具</title>

<style>
body {
margin: 0;
font-family: system-ui, -apple-system;
background: radial-gradient(circle at top, #1e293b, #0f172a);
color: white;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}

.card {
width: 420px;
padding: 28px;
border-radius: 16px;
background: rgba(255,255,255,0.06);
backdrop-filter: blur(16px);
box-shadow: 0 20px 60px rgba(0,0,0,0.5);
border: 1px solid rgba(255,255,255,0.1);
}

h1 {
margin: 0 0 18px 0;
font-size: 20px;
}

.item {
margin: 10px 0;
font-size: 14px;
opacity: 0.9;
}

.label {
opacity: 0.6;
}

.value {
color: #38bdf8;
word-break: break-all;
}

.button {
margin-top: 16px;
padding: 10px;
width: 100%;
border: none;
border-radius: 10px;
background: #38bdf8;
color: black;
font-weight: bold;
cursor: pointer;
}

.button:hover {
background: #0ea5e9;
}
</style>

</head>

<body>

<div class="card">
<h1>🌍 IP 信息查询</h1>

<div id="content">加载中...</div>

<button class="button" onclick="load()">刷新</button>
</div>

<script>

async function load() {
const res = await fetch("/api/ip");
const d = await res.json();

document.getElementById("content").innerHTML = `
<div class="item"><span class="label">IP：</span>
<span class="value">${d.ip}</span></div>

<div class="item"><span class="label">国家：</span>
<span class="value">${d.country}</span></div>

<div class="item"><span class="label">城市：</span>
<span class="value">${d.city}</span></div>

<div class="item"><span class="label">地区：</span>
<span class="value">${d.region}</span></div>

<div class="item"><span class="label">时区：</span>
<span class="value">${d.timezone}</span></div>

<div class="item"><span class="label">组织：</span>
<span class="value">${d.org}</span></div>
`;
}

load();

</script>

</body>
</html>
