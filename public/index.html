<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>IP 情报中心</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:system-ui;
background:#0b1220;
color:white;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
height:100vh;
}

.panel{
padding:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
}

#map{
height:100vh;
}

.card{
padding:15px;
margin:10px 0;
border-radius:12px;
background:rgba(255,255,255,0.06);
}

.value{ color:#4cc9f0; }

</style>

</head>

<body>

<div class="container">

<div class="panel">

<h2>🌐 IP 情报中心</h2>

<div id="info" class="card">加载中...</div>

<div id="stats" class="card"></div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([20,0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: 'OSM'
}).addTo(map);

async function load(){

const r = await fetch("/api/ip");
const d = await r.json();

document.getElementById("info").innerHTML = `
<b>IP:</b> <span class="value">${d.ip}</span><br>
<b>国家:</b> ${d.country}<br>
<b>城市:</b> ${d.city}<br>
<b>地区:</b> ${d.region}<br>
<b>ASN:</b> ${d.asn || "未知"}
`;

// 地图定位
if(d.lat && d.lon){
map.setView([d.lat, d.lon], 10);

L.marker([d.lat, d.lon])
.addTo(map)
.bindPopup("📍 你的位置")
.openPopup();
}

// 统计
const s = await fetch("/api/stats");
const st = await s.json();

document.getElementById("stats").innerHTML = `
<b>📊 访问统计</b><br>
总访问：${st.total}<br>
今日访问：${st.today}
`;

}

load();

</script>

</body>
</html>
